# NEWNET 官网 nginx 配置
# 部署位置：/etc/nginx/conf.d/newnet.conf
# 修改后执行：nginx -t && systemctl reload nginx
# 注意：阿里云 ECS 需在安全组中放行对应端口（80 / 443）

server {
    listen 80;
    # 替换为你的域名；暂无域名时可填服务器公网 IP 或 _
    server_name your-domain.com;

    # 网站文件目录，将项目内容上传到此路径
    root /var/www/newnet;
    index index.html;
    charset utf-8;

    gzip on;
    gzip_min_length 1k;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(jpg|jpeg|png|gif|svg|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}

